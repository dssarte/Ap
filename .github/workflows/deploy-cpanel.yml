name: Deploy FCG Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fcg-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Set up stable npm
        run: npm install --global npm@10.8.0 --no-audit --no-fund

      - name: Install dependencies
        timeout-minutes: 10
        run: npm ci --no-audit --no-fund

      - name: Verify and build production application
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run verify

      - name: Upload to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.CPANEL_FTP_SERVER }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./dist/
          # The FTP account opens at /home/u278sptdh207. Deploy into the
          # document root used by https://fcg.thefigarogroup.ph.
          server-dir: ./public_html/fcg.thefigarogroup.ph/
          dangerous-clean-slate: false
